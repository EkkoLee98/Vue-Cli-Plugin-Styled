name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    environment: DeepSeek   # 👈 这一行必须有

    permissions:
      contents: read
      pull-requests: write   # 发 PR 评论需要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 拉取完整历史，便于 diff

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Call DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # 截断 diff 避免请求体过大，由 jq 读取并正确转义
          head -c 50000 diff.txt > diff_truncated.txt
          REQUEST=$(jq -n --rawfile diff diff_truncated.txt \
            '{
              model: "deepseek-chat",
              messages: [
                { role: "system", content: "You are a senior code reviewer. Give precise, structured feedback." },
                { role: "user", content: ("Review this git diff:\n" + $diff) }
              ],
              stream: false
            }')
          RESPONSE=$(curl -s -w "\n%{http_code}" https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d "$REQUEST")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY" > review.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "DeepSeek API failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

      - name: Extract review text
        run: |
          COMMENT=$(jq -r '.choices[0].message.content // empty' review.json)
          if [ -z "$COMMENT" ]; then
            echo "No review content in response"
            exit 1
          fi
          DELIMITER=$(openssl rand -hex 16)
          echo "COMMENT<<${DELIMITER}" >> $GITHUB_ENV
          echo "$COMMENT" >> $GITHUB_ENV
          echo "${DELIMITER}" >> $GITHUB_ENV

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: process.env.COMMENT
            })